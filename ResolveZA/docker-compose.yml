services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: resolveza-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DevPassword123!"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -Q \"SELECT 1\" || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: resolveza-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
    container_name: resolveza-backend
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_VERSION: "0.1.0"
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      DB_HOST: sqlserver
      DB_PORT: "1433"
      DB_NAME: resolveza
      DB_USER: sa
      DB_SA_PASSWORD: DevPassword123!
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./Frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: resolveza-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
